kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      # Agent health/debug endpoints (NodePort 30080)
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      # Ingestion stub test-query endpoints (NodePort 30081)
      - containerPort: 30081
        hostPort: 30081
        protocol: TCP
