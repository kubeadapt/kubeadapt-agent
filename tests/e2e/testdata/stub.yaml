---
apiVersion: v1
kind: Namespace
metadata:
  name: kubeadapt-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-stub
  namespace: kubeadapt-system
  labels:
    app: ingestion-stub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingestion-stub
  template:
    metadata:
      labels:
        app: ingestion-stub
    spec:
      containers:
        - name: stub
          image: localhost/ingestion-stub:e2e-test
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion-stub
  namespace: kubeadapt-system
  labels:
    app: ingestion-stub
spec:
  type: NodePort
  selector:
    app: ingestion-stub
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30081
      name: http
