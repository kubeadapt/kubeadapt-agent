---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeadapt-agent
  namespace: kubeadapt-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubeadapt-agent
rules:
  # Core resources
  - apiGroups: [""]
    resources:
      - nodes
      - pods
      - namespaces
      - services
      - endpoints
      - persistentvolumes
      - persistentvolumeclaims
      - limitranges
      - resourcequotas
    verbs: ["get", "list", "watch"]
  # Apps resources
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: ["get", "list", "watch"]
  # Batch resources
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  # Autoscaling
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]
  # VPA (optional — may not be installed)
  - apiGroups: ["autoscaling.k8s.io"]
    resources:
      - verticalpodautoscalers
    verbs: ["get", "list", "watch"]
  # Networking
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
  # Storage
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
    verbs: ["get", "list", "watch"]
  # Scheduling
  - apiGroups: ["scheduling.k8s.io"]
    resources:
      - priorityclasses
    verbs: ["get", "list", "watch"]
  # Policy
  - apiGroups: ["policy"]
    resources:
      - poddisruptionbudgets
    verbs: ["get", "list", "watch"]
  # Metrics API
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - nodes
      - pods
    verbs: ["get", "list"]
  # Karpenter (optional — may not be installed)
  - apiGroups: ["karpenter.sh"]
    resources:
      - nodepools
    verbs: ["get", "list", "watch"]
  # Discovery — check API availability
  - nonResourceURLs: ["/apis", "/apis/*"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubeadapt-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubeadapt-agent
subjects:
  - kind: ServiceAccount
    name: kubeadapt-agent
    namespace: kubeadapt-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeadapt-agent
  namespace: kubeadapt-system
  labels:
    app: kubeadapt-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubeadapt-agent
  template:
    metadata:
      labels:
        app: kubeadapt-agent
    spec:
      serviceAccountName: kubeadapt-agent
      containers:
        - name: agent
          image: localhost/kubeadapt-agent:e2e-test
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: health
          env:
            - name: KUBEADAPT_API_KEY
              value: "e2e-test-token"
            - name: KUBEADAPT_CLUSTER_NAME
              value: "e2e-test-cluster"
            - name: KUBEADAPT_BACKEND_URL
              value: "http://ingestion-stub.kubeadapt-system.svc.cluster.local:8080"
            - name: KUBEADAPT_ALLOW_INSECURE
              value: "true"
            - name: KUBEADAPT_SNAPSHOT_INTERVAL
              value: "10s"
            - name: KUBEADAPT_METRICS_INTERVAL
              value: "10s"
            - name: KUBEADAPT_INFORMER_SYNC_TIMEOUT
              value: "2m"
            - name: KUBEADAPT_DEBUG_ENDPOINTS
              value: "true"
            - name: KUBEADAPT_HEALTH_PORT
              value: "8080"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: kubeadapt-agent
  namespace: kubeadapt-system
  labels:
    app: kubeadapt-agent
spec:
  type: NodePort
  selector:
    app: kubeadapt-agent
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
      name: health
